<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator">
        <input type="text" id="display" disabled>

        <div class="buttons">
            <button>C</button>
            <button>⌫</button>
            <button>%</button>
            <button>/</button>
        
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>*</button>
        
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>-</button>
        
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>+</button>
        
            <button>0</button>
            <button>.</button>
            <button>x²</button>
            <button>√</button>
        
            <button>=</button>
        </div>
    </div>

<script src="script.js">
    if (value === "C") {
            currentInput = "";
            updateDisplay();

        } else if (value === "⌫") {
            currentInput = currentInput.slice(0, -1);
            updateDisplay();

        } else if (value === "%") {
            currentInput = (parseFloat(currentInput) / 100).toString();
            updateDisplay();

        } else if (value === "x²") {
            currentInput = (parseFloat(currentInput) ** 2).toString();
            updateDisplay();

        } else if (value === "√") {
            currentInput = Math.sqrt(parseFloat(currentInput)).toString();
            updateDisplay();

        } else if (value === "=") {
            calculateResult();

        } else {
            currentInput += value;
            updateDisplay();
        }
</script>
</body>
</html>
